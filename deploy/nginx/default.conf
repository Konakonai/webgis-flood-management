map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Empty keys are not counted by limit_req_zone, so these zones apply only to
# the two anonymous write paths and leave authenticated API traffic untouched.
map "$request_method:$uri" $public_report_rate_key {
    default "";
    "POST:/api/reports" $binary_remote_addr;
}

map "$request_method:$uri" $report_image_rate_key {
    default "";
    ~^POST:/api/reports/[A-Za-z0-9-]+/images$ $binary_remote_addr;
}

map "$request_method:$uri" $login_rate_key {
    default "";
    "POST:/api/auth/login" $binary_remote_addr;
}

map "$request_method:$uri" $spatial_query_rate_key {
    default "";
    "POST:/api/spatial-query" $binary_remote_addr;
}

limit_req_zone $public_report_rate_key zone=public_reports_per_ip:10m rate=6r/m;
limit_req_zone $report_image_rate_key zone=report_images_per_ip:10m rate=20r/m;
limit_req_zone $login_rate_key zone=login_per_ip:10m rate=10r/m;
limit_req_zone $spatial_query_rate_key zone=spatial_query_per_ip:10m rate=60r/m;

upstream floodgis_backend {
    server backend:8080;
    keepalive 16;
}

upstream floodgis_osrm {
    server osrm:5000;
    keepalive 8;
}

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /api/ {
        limit_req zone=public_reports_per_ip burst=5 nodelay;
        limit_req zone=report_images_per_ip burst=10 nodelay;
        limit_req zone=login_per_ip burst=5 nodelay;
        limit_req zone=spatial_query_per_ip burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://floodgis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location ^~ /ws {
        proxy_pass http://floodgis_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 1h;
    }

    location ^~ /uploads/ {
        proxy_pass http://floodgis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 60s;
    }

    # Same-origin OSRM gateway. Example:
    # /osrm/route/v1/driving/117.18,34.26;117.22,34.27?overview=full&geometries=geojson
    location ^~ /osrm/ {
        proxy_pass http://floodgis_osrm/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache";
    }
}
