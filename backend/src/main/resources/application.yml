server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never

spring:
  application:
    name: flood-gis-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flood_gis}
    username: ${DATABASE_USERNAME:gis}
    password: ${DATABASE_PASSWORD:gis123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:10}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:2}
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:6MB}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT Configuration
jwt:
  # Demo fallback only. Production deployments must set JWT_SECRET.
  secret: ${JWT_SECRET:flood-gis-demo-secret-change-before-production-2026}
  expiration: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  mock-data:
    enabled: ${MOCK_DATA_ENABLED:true}
    push-interval-ms: ${MOCK_DATA_INTERVAL_MS:5000}
  upload:
    directory: ${UPLOAD_DIRECTORY:./data/uploads}
    max-image-bytes: ${UPLOAD_MAX_IMAGE_BYTES:5242880}
    max-image-pixels: ${UPLOAD_MAX_IMAGE_PIXELS:25000000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    com.floodgis: ${APP_LOG_LEVEL:info}
    org.springframework.security: info
